<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in - Claude Code Usage Dashboard</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%93%8A%3C/text%3E%3C/svg%3E">
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --border: #2a2d3a;
    --text: #e2e8f0;
    --muted: #8892a4;
    --accent: #d97757;
    --error: #f87171;
    --success: #4ade80;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text); min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex; align-items: center; justify-content: center;
  }
  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 40px; width: 400px; max-width: 92vw;
  }
  h1 { color: var(--accent); font-size: 20px; margin-bottom: 6px; }
  p.sub { color: var(--muted); font-size: 13px; margin-bottom: 24px; line-height: 1.5; }
  label { display: block; color: var(--muted); font-size: 11px; text-transform: uppercase;
          letter-spacing: 0.05em; margin-bottom: 6px; margin-top: 14px; }
  label:first-of-type { margin-top: 0; }
  input {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    color: var(--text); padding: 10px 12px; border-radius: 6px;
    font-size: 14px; font-family: inherit;
  }
  input:focus { outline: none; border-color: var(--accent); }
  button {
    width: 100%; background: var(--accent); color: white; border: none;
    padding: 11px; border-radius: 6px; font-size: 14px; font-weight: 600;
    cursor: pointer; margin-top: 20px;
  }
  button:hover { filter: brightness(1.1); }
  button:disabled { opacity: 0.6; cursor: not-allowed; }
  #msg { margin-top: 16px; font-size: 13px; line-height: 1.4; }
  #msg.error   { color: var(--error); }
  #msg.success { color: var(--success); }
</style>
</head>
<body>
<div class="card">
  <h1>Sign in</h1>
  <p class="sub">Claude Code Usage Dashboard. Restricted to allowlisted team members.</p>
  <form id="login-form">
    <label for="email">Email</label>
    <input type="email" id="email" placeholder="you@company.com" required autocomplete="email" autofocus>
    <label for="password">Password</label>
    <input type="password" id="password" placeholder="Password" required autocomplete="current-password">
    <button type="submit" id="submit-btn">Sign in</button>
  </form>
  <div id="msg"></div>
</div>

<script>
(async function() {
  const token = localStorage.getItem('dashboard_token');
  if (token) {
    try {
      const res = await fetch('/api/auth-check', {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      if (res.ok) { window.location.replace('/'); return; }
    } catch (e) {}
    localStorage.removeItem('dashboard_token');
  }
})();

function setMsg(text, kind) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = kind || '';
}

document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submit-btn');
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  if (!email || !password) return;

  btn.disabled = true;
  setMsg('Signing in…');

  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });
    const data = await res.json();
    if (!res.ok) {
      setMsg(data.error || ('HTTP ' + res.status), 'error');
      btn.disabled = false;
      return;
    }
    localStorage.setItem('dashboard_token', data.token);
    localStorage.setItem('dashboard_email', data.email);
    localStorage.setItem('dashboard_role', data.role);
    window.location.replace('/');
  } catch (err) {
    setMsg('Network error: ' + err.message, 'error');
    btn.disabled = false;
  }
});
</script>
</body>
</html>
